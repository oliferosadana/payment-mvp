server {
    listen 80;
    server_name payment.example.com;

    location / {
        proxy_pass http://127.0.0.1:8099;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS production example after DNS points to the server:
# 1. apt install nginx certbot python3-certbot-nginx
# 2. cp this file to /etc/nginx/sites-available/payment-saas.conf
# 3. ln -s /etc/nginx/sites-available/payment-saas.conf /etc/nginx/sites-enabled/
# 4. nginx -t && systemctl reload nginx
# 5. certbot --nginx -d payment.example.com
